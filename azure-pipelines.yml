trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'

steps:
  - task: UseDotNet@2
    displayName: 'Use .NET SDK'
    inputs:
      packageType: 'sdk'
      version: '8.x'

  - script: dotnet restore SalesOrder.sln
    displayName: 'Restore'

  - script: dotnet build SalesOrder.sln --configuration $(buildConfiguration) --no-restore
    displayName: 'Build'
